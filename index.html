<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mathion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    h1 {
      font-size: 60px;
      margin-bottom: 20px;
    }
    p {
      font-size: 20px;
      max-width: 600px;
    }
    button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      color: black;
    }
    button:hover {
      background: #ddd;
    }
  </style>
</head>
<body>
  <div>
    <h1>Mathion</h1>
    <p>
      Building powerful Python tools for mathematics, science, and innovation.
    </p>
    <button>Get Started</button>
  </div>
</body>
</html>
